name: Test & Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/ config/

      - name: Test
        run: pytest tests/ -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          rsync -az --delete \
            --exclude '.venv' \
            --exclude '.git' \
            --exclude 'data/*.db' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache' \
            --exclude '.env' \
            --exclude '.idea' \
            --exclude '*.egg-info' \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/kukulkan-trade/

      - name: Fix file ownership
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "\
            chown -R kukulkan:kukulkan /opt/kukulkan-trade/"

      - name: Deploy nginx configs
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "\
            cp /opt/kukulkan-trade/deploy/nginx/kukulkan.trade /etc/nginx/sites-available/ && \
            rm -f /etc/nginx/sites-available/app.kukulkan.trade && \
            rm -f /etc/nginx/sites-enabled/app.kukulkan.trade && \
            ln -sf /etc/nginx/sites-available/kukulkan.trade /etc/nginx/sites-enabled/kukulkan.trade && \
            nginx -t && systemctl reload nginx"

      - name: Deploy systemd services
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "\
            cp /opt/kukulkan-trade/deploy/kukulkan-bot.service /etc/systemd/system/ && \
            cp /opt/kukulkan-trade/deploy/kukulkan-api.service /etc/systemd/system/ && \
            systemctl daemon-reload"

      - name: Install dependencies
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "\
            cd /opt/kukulkan-trade && \
            source .venv/bin/activate && \
            pip install -e ."

      - name: Run database migrations
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "\
            cd /opt/kukulkan-trade && \
            source .venv/bin/activate && \
            DB_URL=\$(grep '^DATABASE_URL=' .env | cut -d'=' -f2- | tr -d '\"' || echo 'data/kukulkan.db') && \
            python scripts/migrate.py --db \"\$DB_URL\""

      - name: Restart services
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "\
            systemctl enable kukulkan-bot kukulkan-api && \
            systemctl restart kukulkan-bot && \
            systemctl restart kukulkan-api"

      - name: Health check
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "\
            sleep 5 && \
            systemctl is-active --quiet kukulkan-bot || (echo 'kukulkan-bot failed to start' && exit 1) && \
            systemctl is-active --quiet kukulkan-api || (echo 'kukulkan-api failed to start' && exit 1) && \
            echo 'All services healthy'"
