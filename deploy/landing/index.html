<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kukulkán — Algorithmic Trading</title>
    <meta name="description" content="AI-powered algorithmic trading system. Precision. Autonomy. Discipline.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #0a0a0b;
            --jade: #2d6b4f;
            --jade-glow: #3d9b6f;
            --gold: #c9a84c;
            --gold-dim: #8a7235;
            --bone: #e8e0d0;
            --stone: #6b6560;
            --smoke: #1a1a1c;
            --blood: #8b2d2d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--obsidian);
            color: var(--bone);
            font-family: 'Cormorant Garamond', Georgia, serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* === AZTEC PATTERN BACKGROUND === */
        .bg-pattern {
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 60px,
                    var(--gold) 60px,
                    var(--gold) 61px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 60px,
                    var(--gold) 60px,
                    var(--gold) 61px
                );
            pointer-events: none;
            z-index: 0;
        }

        .bg-grain {
            position: fixed;
            inset: 0;
            opacity: 0.4;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* === SERPENT LINE === */
        .serpent-line {
            position: fixed;
            top: 0;
            left: 50%;
            width: 1px;
            height: 100vh;
            background: linear-gradient(
                to bottom,
                transparent 0%,
                var(--jade) 20%,
                var(--gold-dim) 50%,
                var(--jade) 80%,
                transparent 100%
            );
            opacity: 0.15;
            z-index: 0;
        }

        /* === MAIN LAYOUT === */
        main {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        /* === GLYPH === */
        .glyph {
            width: 120px;
            height: 120px;
            margin-bottom: 3rem;
            position: relative;
            animation: breathe 6s ease-in-out infinite;
        }

        .glyph svg {
            width: 100%;
            height: 100%;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); }
        }

        /* === TITLE === */
        .title {
            font-size: clamp(3.5rem, 8vw, 7rem);
            font-weight: 300;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            text-align: center;
            color: var(--bone);
            margin-bottom: 0.5rem;
            line-height: 1;
            animation: fadeUp 1.5s ease-out both;
        }

        .title span {
            display: inline-block;
            background: linear-gradient(135deg, var(--bone) 0%, var(--gold) 50%, var(--bone) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 8s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === ACCENT LINE === */
        .accent-line {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 2rem auto;
            animation: fadeUp 1.5s ease-out 0.3s both;
        }

        /* === SUBTITLE === */
        .subtitle {
            font-size: clamp(0.85rem, 1.5vw, 1.1rem);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 300;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--stone);
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeUp 1.5s ease-out 0.5s both;
        }

        /* === STATUS PANEL === */
        .status {
            display: flex;
            gap: 3rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp 1.5s ease-out 0.8s both;
        }

        .status-item {
            text-align: center;
            position: relative;
        }

        .status-item::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 3px;
            background: var(--jade-glow);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--jade-glow);
        }

        .status-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--stone);
            margin-bottom: 0.5rem;
        }

        .status-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--jade-glow);
            letter-spacing: 0.1em;
        }

        .status-value.gold { color: var(--gold); }

        /* === BOTTOM INSCRIPTION === */
        .inscription {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            color: var(--stone);
            opacity: 0.4;
            white-space: nowrap;
        }

        /* === CORNER GLYPHS === */
        .corner {
            position: fixed;
            width: 40px;
            height: 40px;
            opacity: 0.08;
        }

        .corner-tl { top: 2rem; left: 2rem; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
        .corner-tr { top: 2rem; right: 2rem; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
        .corner-bl { bottom: 2rem; left: 2rem; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
        .corner-br { bottom: 2rem; right: 2rem; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

        /* === RESPONSIVE === */
        @media (max-width: 600px) {
            .status { gap: 2rem; }
            .title { letter-spacing: 0.2em; }
            .subtitle { letter-spacing: 0.3em; }
            .inscription { font-size: 0.45rem; letter-spacing: 0.4em; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="bg-grain"></div>
    <div class="serpent-line"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <main>
        <!-- Feathered Serpent Glyph -->
        <div class="glyph">
            <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Outer ring -->
                <circle cx="60" cy="60" r="55" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
                <circle cx="60" cy="60" r="48" stroke="#2d6b4f" stroke-width="0.3" opacity="0.4"/>

                <!-- Serpent body — stylized S curve -->
                <path d="M60 15 C75 15, 90 30, 85 45 C80 60, 65 55, 60 60 C55 65, 40 60, 35 75 C30 90, 45 105, 60 105"
                      stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>

                <!-- Feather details -->
                <path d="M78 28 L92 22" stroke="#2d6b4f" stroke-width="0.5" opacity="0.5"/>
                <path d="M85 38 L98 35" stroke="#2d6b4f" stroke-width="0.5" opacity="0.4"/>
                <path d="M82 50 L95 50" stroke="#2d6b4f" stroke-width="0.5" opacity="0.3"/>

                <path d="M42 72 L28 68" stroke="#2d6b4f" stroke-width="0.5" opacity="0.3"/>
                <path d="M35 82 L22 80" stroke="#2d6b4f" stroke-width="0.5" opacity="0.4"/>
                <path d="M38 92 L25 95" stroke="#2d6b4f" stroke-width="0.5" opacity="0.5"/>

                <!-- Eye -->
                <circle cx="70" cy="30" r="2" fill="#c9a84c" opacity="0.8"/>
                <circle cx="70" cy="30" r="4" stroke="#c9a84c" stroke-width="0.3" fill="none" opacity="0.3"/>

                <!-- Cardinal points -->
                <circle cx="60" cy="8" r="1" fill="#2d6b4f" opacity="0.5"/>
                <circle cx="60" cy="112" r="1" fill="#2d6b4f" opacity="0.5"/>
                <circle cx="8" cy="60" r="1" fill="#2d6b4f" opacity="0.5"/>
                <circle cx="112" cy="60" r="1" fill="#2d6b4f" opacity="0.5"/>
            </svg>
        </div>

        <h1 class="title"><span>Kukulkán</span></h1>

        <div class="accent-line"></div>

        <p class="subtitle">Algorithmic Trading System</p>

        <div class="status">
            <div class="status-item">
                <div class="status-label">System</div>
                <div class="status-value">Operational</div>
            </div>
            <div class="status-item">
                <div class="status-label">Strategy</div>
                <div class="status-value gold">AI Autonomy</div>
            </div>
            <div class="status-item">
                <div class="status-label">Executor</div>
                <div class="status-value">Alpaca</div>
            </div>
            <div class="status-item">
                <div class="status-label">Cycle</div>
                <div class="status-value" id="cycle">16:30 ET Daily</div>
            </div>
        </div>
    </main>

    <div class="inscription">Precision &nbsp;·&nbsp; Autonomy &nbsp;·&nbsp; Discipline</div>

    <script>
        // Subtle parallax on the serpent line
        document.addEventListener('mousemove', (e) => {
            const line = document.querySelector('.serpent-line');
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            line.style.transform = `translateX(calc(-50% + ${x}px))`;
        });
    </script>
</body>
</html>
